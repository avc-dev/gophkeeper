syntax = "proto3";

package gophkeeper.v1;

option go_package = "github.com/avc-dev/gophkeeper/proto;pb";

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest)       returns (LoginResponse);
}

message RegisterRequest {
  string email    = 1;
  string password = 2;
}

message RegisterResponse {
  string token    = 1;
  bytes  kdf_salt = 2;
}

message LoginRequest {
  string email    = 1;
  string password = 2;
}

message LoginResponse {
  string token    = 1;
  bytes  kdf_salt = 2;
}
