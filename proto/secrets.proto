syntax = "proto3";

package gophkeeper.v1;

option go_package = "github.com/avc-dev/gophkeeper/proto;pb";

import "google/protobuf/timestamp.proto";

service SecretsService {
  rpc Ping(PingRequest)                 returns (PingResponse);
  rpc CreateSecret(CreateSecretRequest) returns (CreateSecretResponse);
  rpc GetSecret(GetSecretRequest)       returns (GetSecretResponse);
  rpc ListSecrets(ListSecretsRequest)   returns (ListSecretsResponse);
  rpc UpdateSecret(UpdateSecretRequest) returns (UpdateSecretResponse);
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);
}

// --- Ping ---

message PingRequest {}

message PingResponse {
  google.protobuf.Timestamp server_time = 1;
}

// --- Типы секретов ---

enum SecretType {
  SECRET_TYPE_UNSPECIFIED = 0;
  SECRET_TYPE_CREDENTIAL  = 1;
  SECRET_TYPE_CARD        = 2;
  SECRET_TYPE_TEXT        = 3;
  SECRET_TYPE_BINARY      = 4;
  SECRET_TYPE_OTP         = 5;
}

// --- Общая модель секрета ---

message Secret {
  string                    id                = 1;
  string                    name              = 2;
  SecretType                type              = 3;
  bytes                     encrypted_payload = 4;
  string                    metadata          = 5; // JSON, plaintext (MVP)
  int64                     version           = 6;
  google.protobuf.Timestamp created_at        = 7;
  google.protobuf.Timestamp updated_at        = 8;
}

// --- CreateSecret ---

message CreateSecretRequest {
  string     name              = 1;
  SecretType type              = 2;
  bytes      encrypted_payload = 3;
  string     metadata          = 4;
}

message CreateSecretResponse {
  string                    id         = 1;
  int64                     version    = 2;
  google.protobuf.Timestamp created_at = 3;
}

// --- GetSecret ---

message GetSecretRequest {
  string id = 1;
}

message GetSecretResponse {
  Secret secret = 1;
}

// --- ListSecrets ---

message ListSecretsRequest {
  // Если задано — возвращаем только записи обновлённые после since (для инкрементальной синхронизации).
  // Нулевое значение — вернуть все записи пользователя.
  google.protobuf.Timestamp since = 1;
}

message ListSecretsResponse {
  repeated Secret secrets = 1;
}

// --- UpdateSecret ---

message UpdateSecretRequest {
  string id               = 1;
  bytes  encrypted_payload = 2;
  string metadata          = 3;
  int64  expected_version  = 4; // сервер вернёт ABORTED если version != expected_version
}

message UpdateSecretResponse {
  int64                     version    = 1;
  google.protobuf.Timestamp updated_at = 2;
}

// --- DeleteSecret ---

message DeleteSecretRequest {
  string id = 1;
}

message DeleteSecretResponse {}
