version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gophkeeper
      POSTGRES_PASSWORD: gophkeeper
      POSTGRES_DB: gophkeeper_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gophkeeper"]
      interval: 5s
      timeout: 5s
      retries: 5
